<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Clientes - ALO Group</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { background-color: #f5f5f5; font-family: Arial, sans-serif; }
    .container-menu { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; padding: 20px; }
    .card-menu { width: 100%; max-width: 400px; padding: 30px; background-color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 8px; }
    .btn-service { margin: 10px 0; width: 100%; height: 50px; font-weight: bold; border-radius: 5px; display: flex; align-items: center; justify-content: center;}
    .header-title { text-align: center; margin-bottom: 5px; font-size: 1.8em; color: #333; font-weight: bold;}
    .welcome-text { text-align: center; margin-bottom: 25px; color: #666; font-size: 1.1em; }
    .logout-link { display: block; text-align: center; margin-top: 20px; cursor: pointer; color: #d32f2f; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container container-menu">
    <div class="card-menu">
      <div class="header-title">PORTAL DE SERVICIOS</div>
      <div class="welcome-text" id="welcomeMessage">Cargando perfil...</div>
      
      <button class="btn btn-service waves-effect waves-light blue darken-2" type="button" onclick="irAServicio('formulario.html')">
        <i class="material-icons left" style="margin-right: 10px;">assignment_ind</i> Actualizar mis datos
      </button>

      <button class="btn btn-service waves-effect waves-light orange darken-3" type="button" onclick="irAServicio('mantencionretiro.html')">
        <i class="material-icons left" style="margin-right: 10px;">build</i> Mantención o Retiro
      </button>

      <a class="logout-link" onclick="cerrarSesion()">Cerrar Sesión</a>
    </div>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const storedData = sessionStorage.getItem('sapClientData');
      if (!storedData) {
        window.location.href = 'index.html'; 
        return;
      }
      const clientData = JSON.parse(storedData);
      document.getElementById('welcomeMessage').innerText = `Hola, ${clientData.RazonSocial || 'Cliente'}`;
    });

    function irAServicio(urlDestino) {
      window.location.href = urlDestino;
    }

    function cerrarSesion() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
