<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso Seguro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <style>
        body { background-color: #f5f5f5; }
        .container { max-width: 500px; margin-top: 50px; }
        .card-panel { padding: 20px; }
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #4CAF50; border-radius: 50%;
            width: 24px; height: 24px; animation: spin 2s linear infinite; display: inline-block;
            vertical-align: middle; margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-message { display: flex; align-items: center; justify-content: center; font-size: 1.2em; color: #555; margin-top: 20px; }
        .hide { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col s12">
            <div class="card-panel grey lighten-5 z-depth-1">
                <h4 class="center-align">Acceso Seguro</h4>

                <div id="validation-form-container">
                    <form id="validation-form">
                        <div class="input-field">
                            <input id="rut" type="text" class="validate" name="rut">
                            <label for="rut">RUT de la empresa (sin puntos y con guion)</label>
                            <span id="rut-error" class="helper-text red-text"></span>
                        </div>
                        <div class="input-field">
                            <input id="email" type="email" class="validate" name="email">
                            <label for="email">Correo electrónico de contacto</label>
                            <span id="email-error" class="helper-text red-text"></span>
                        </div>
                        <button type="submit" id="submit-validation-button" class="btn waves-effect waves-light">Enviar Código</button>
                    </form>
                </div>

                <div id="otp-form-container" class="hide">
                    <form id="otp-form">
                        <p class="center-align">Se ha enviado un código de acceso a su correo.</p>
                        <div class="input-field">
                            <input id="otp" type="text" class="validate" name="otp">
                            <label for="otp">Ingrese el código de 6 dígitos</label>
                            <span id="otp-error" class="helper-text red-text"></span>
                        </div>
                        <button type="submit" id="submit-otp-button" class="btn waves-effect waves-light">Validar Código</button>
                    </form>
                </div>

                <div id="success-message-container" class="hide">
                    <p class="center-align">✅ Código validado con éxito. Redirigiendo...</p>
                </div>

                <div id="loading-indicator" class="loading-message hide">
                    <div class="loader"></div>
                    <span>Cargando datos...</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script>
    // URLS de Producción de n8n
    const WEBHOOK_PROCESS_EMAIL = 'https://alogroup.app.n8n.cloud/webhook-test/sap/processEmail';
    const WEBHOOK_VALIDATE_OTP = 'https://alogroup.app.n8n.cloud/webhook-test/sap/validateOTP';

    let userEmailGlobal = '';
    let userRutGlobal = '';
    let otpHashGlobal = '';
    let otpExpiryGlobal = 0;

    document.getElementById('validation-form').addEventListener('submit', function(e) {
        e.preventDefault(); submitValidation();
    });

    document.getElementById('otp-form').addEventListener('submit', function(e) {
        e.preventDefault(); submitOTP();
    });

    function showLoading() {
        document.getElementById('loading-indicator').classList.remove('hide');
        document.getElementById('submit-validation-button').setAttribute('disabled', 'disabled');
        document.getElementById('submit-otp-button').setAttribute('disabled', 'disabled');
    }

    function hideLoading() {
        document.getElementById('loading-indicator').classList.add('hide');
        document.getElementById('submit-validation-button').removeAttribute('disabled');
        document.getElementById('submit-otp-button').removeAttribute('disabled');
    }

    async function submitValidation() {
        userRutGlobal = document.getElementById('rut').value.trim();
        userEmailGlobal = document.getElementById('email').value.trim();
        
        let rutError = document.getElementById('rut-error');
        let emailError = document.getElementById('email-error');
        
        rutError.textContent = !userRutGlobal ? '❌ Ingrese el RUT.' : '';
        emailError.textContent = (!userEmailGlobal || !isValidEmail(userEmailGlobal)) ? '❌ Correo inválido.' : '';

        if (rutError.textContent || emailError.textContent) return;

        showLoading();

        try {
            const response = await fetch(WEBHOOK_PROCESS_EMAIL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rut: userRutGlobal, email: userEmailGlobal })
            });
            const result = await response.json();
            
            hideLoading();
            M.toast({html: result.message, classes: response.ok ? 'green darken-1' : 'red darken-1'});
            
            if (response.ok && result.success) {
                otpHashGlobal = result.otpHash;
                otpExpiryGlobal = result.otpExpiry;
                
                document.getElementById('validation-form-container').classList.add('hide');
                document.getElementById('otp-form-container').classList.remove('hide');
            }
        } catch (error) {
            hideLoading();
            M.toast({html: '❌ Error de red al conectar con el servidor.', classes: 'red darken-1'});
        }
    }

    async function submitOTP() {
        const userOTP = document.getElementById('otp').value.trim();
        const otpError = document.getElementById('otp-error');

        if (!userOTP || userOTP.length !== 6) {
            otpError.textContent = '❌ El código debe ser de 6 dígitos.'; return;
        } else { otpError.textContent = ''; }

        showLoading();

        try {
            const response = await fetch(WEBHOOK_VALIDATE_OTP, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    rut: userRutGlobal, 
                    email: userEmailGlobal, 
                    otp: userOTP,
                    otpHash: otpHashGlobal,
                    otpExpiry: otpExpiryGlobal
                })
            });
            const result = await response.json();
            
            hideLoading();
            
            if (response.ok) { 
                M.toast({html: '✅ Validado con éxito.', classes: 'green darken-1'});
                document.getElementById('otp-form-container').classList.add('hide');
                document.getElementById('success-message-container').classList.remove('hide');
                
                sessionStorage.setItem('sapClientData', JSON.stringify(result.data));
                sessionStorage.setItem('sapRut', userRutGlobal);
                
                // 👇 ESTE ES EL CAMBIO PRINCIPAL: Redirección al Menú 👇
                setTimeout(() => { window.location.href = 'menucliente.html'; }, 1000);
                
            } else {
                M.toast({html: result.message || '❌ Error al validar.', classes: 'red darken-1'});
            }
        } catch (error) {
            hideLoading();
            M.toast({html: '❌ Error de red al conectar con el servidor.', classes: 'red darken-1'});
        }
    }

    function isValidEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
</script>
</body>
</html>
